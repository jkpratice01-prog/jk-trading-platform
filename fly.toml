# Fly.io configuration for the FastAPI backend
app = "jk-trading-backend"
primary_region = "iad"          # US East — change to "lax" (US West), "lhr" (London), etc.

[build]
  dockerfile = "Dockerfile.backend"

[env]
  DB_PATH = "/data/trading.db"

[mounts]
  source = "trading_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "30s"
    timeout  = "10s"
    path     = "/api/health"

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1