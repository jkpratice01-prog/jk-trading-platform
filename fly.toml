# Fly.io configuration — jk-trading-backend
app            = "jk-trading-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.backend"

[env]
  DB_PATH     = "/data/trading.db"
  PORT        = "8080"
  CORS_ORIGIN = "*"

[[mounts]]
  source      = "trading_data"
  destination = "/data"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "10s"
    grace_period = "15s"
    method       = "GET"
    path         = "/api/health"

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1